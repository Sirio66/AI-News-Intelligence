<!DOCTYPE html>
<html>
<head>
    <title>AI News Brief</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>AI News Intelligence Brief</h1>

<button onclick="runPipeline()">Run Pipeline</button>
<button onclick="loadBrief()">Load Brief</button>

<div id="output"></div>

<script>
async function runPipeline() {
    await fetch('/scrape');
    await fetch('/rank');
    await fetch('/summarize');
    alert("Pipeline completed!");
}

async function loadBrief() {
    const res = await fetch('/brief');
    const data = await res.json();

    const container = document.getElementById("output");
    container.innerHTML = "";

    data.top_news_brief.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${item.rank}. ${item.title}</h3>
            <p>${item.summary}</p>
            <small>Score: ${item.score}</small>
        `;

        container.appendChild(div);
    });
}
</script>

</body>
</html>
